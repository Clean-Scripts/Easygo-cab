<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EasyGo Cabs | Premium Explorer</title>
    <link rel="icon" type="image/jpeg" href="easy go.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-size: 16px; overflow-x: hidden; background: #f0f9ff; font-family: 'Inter', system-ui, sans-serif; }
        
        .page-section { display: none; animation: fadeInUp 0.4s ease-out; }
        .page-section.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal { display: none; background-color: rgba(2, 6, 23, 0.85); backdrop-filter: blur(8px); z-index: 9999; align-items: center; justify-content: center; }
        .modal.active { display: flex; animation: modalPop 0.2s ease; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .suggestions-box {
            position: absolute; width: 100%; background: white; z-index: 1000;
            border-radius: 1rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            max-height: 260px; overflow-y: auto; display: none; border: 1px solid #eef2ff;
            margin-top: 6px;
        }
        .suggestion-item { padding: 14px 20px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-weight: 700; color: #1e293b; transition: all 0.2s; background: white; }
        .suggestion-item:hover { background: #dbeafe; color: #1e3a8a; padding-left: 28px; }
        
        .tours-explorer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 2rem; }
        .tour-card { transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #eef2ff; }
        .tour-card:hover { transform: translateY(-8px); box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.2); }
        
        .filter-chip { transition: all 0.2s; cursor: pointer; background: #f8fafc; border: 1px solid #e2e8f0; }
        .filter-chip.active { background: #0f172a !important; color: white !important; border-color: #0f172a !important; }
        
        .star-rating i { cursor: pointer; transition: all 0.15s; font-size: 2rem; margin: 0 4px; }
        .star-rating i.active { color: #fbbf24; text-shadow: 0 0 5px #ffb347; }
        
        .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .faq-item.active .faq-answer { max-height: 380px; }
        .faq-item.active .faq-icon { transform: rotate(180deg); }
        
        .explorer-search-input { width: 100%; padding: 12px 20px 12px 48px; border-radius: 60px; border: 2px solid #e2e8f0; outline: none; }
    </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">

    <div id="toast-container" class="fixed top-24 right-5 z-[10000] flex flex-col gap-3 pointer-events-none"></div>

    <nav class="bg-white/95 backdrop-blur-sm shadow-xl sticky top-0 z-50 border-b-4 border-blue-700">
        <div class="max-w-7xl mx-auto px-5 h-24 flex justify-between items-center">
            <div class="flex items-center cursor-pointer" onclick="showPage('home')">
                <img src="easy go.jpg" class="h-14 w-14 rounded-full border-2 border-blue-600">
                <div class="ml-3">
                    <span class="block font-black text-2xl text-blue-900 leading-none">EasyGo</span>
                    <span class="block text-xs font-bold text-blue-600 uppercase tracking-widest">Premium Cabs</span>
                </div>
            </div>
            <div class="hidden xl:flex items-center space-x-6">
                <button onclick="showPage('home')" class="font-bold hover:text-blue-700">Home</button>
                <button onclick="showPage('tours')" class="font-bold hover:text-blue-700">Explorer</button>
                <button onclick="showPage('faq')" class="font-bold hover:text-blue-700">FAQ</button>
                <div id="userMenu" class="hidden flex items-center space-x-4 bg-slate-100 px-4 py-2 rounded-full">
                    <span id="displayUserName" class="font-black text-sm"></span>
                    <button onclick="logout()" class="text-xs bg-red-500 text-white px-3 py-1 rounded-full">Logout</button>
                </div>
                <button id="loginBtn" onclick="openLoginModal()" class="bg-blue-700 text-white px-6 py-2 rounded-full font-bold">Login</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        <div id="activeRideBanner" class="hidden bg-slate-900 text-white border-b-4 border-yellow-400 p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="animate-pulse text-yellow-400 text-xl"><i class="fas fa-car"></i></div>
                    <div><p class="text-xs font-bold uppercase text-gray-400">Current Ride</p><p id="activeRideRoute" class="font-black text-sm"></p></div>
                </div>
                <div class="text-center bg-white/10 px-4 py-1 rounded-lg">
                    <p class="text-[10px] font-bold">OTP</p>
                    <p id="activeRideOTP" class="text-xl font-black tracking-tighter text-yellow-400"></p>
                </div>
                <button onclick="endRideProcess()" class="bg-red-600 px-4 py-2 rounded-lg font-bold text-sm">END RIDE</button>
            </div>
        </div>

        <section id="home" class="page-section active max-w-7xl mx-auto px-5 py-8">
            <div class="grid lg:grid-cols-12 gap-8">
                <div class="lg:col-span-7 bg-white rounded-3xl shadow-xl overflow-hidden relative">
                    <div id="map" class="w-full h-[600px] z-0"></div>
                    <div class="absolute top-4 right-4 z-10"><button onclick="locateMeOnMap()" class="bg-white p-3 rounded-full shadow-xl text-blue-600 hover:bg-blue-50"><i class="fas fa-crosshairs text-xl"></i></button></div>
                    <div class="absolute bottom-4 left-4 bg-white/90 p-4 rounded-2xl shadow-xl z-10 border border-blue-100">
                        <p class="text-[10px] font-black text-gray-500 uppercase">Est. Distance</p>
                        <p id="mapDistanceDisplay" class="text-2xl font-black text-blue-900">0.0 km</p>
                    </div>
                </div>
                
                <div class="lg:col-span-5">
                    <div class="bg-white p-6 rounded-3xl shadow-xl border border-blue-50">
                        <h2 class="text-2xl font-black mb-6">📅 BOOK A RIDE</h2>
                        <form id="bookingForm" onsubmit="handleBooking(event)" class="space-y-4">
                            <input type="hidden" id="customerPhone" name="Phone"><input type="hidden" id="customerNameField" name="Name">
                            <input type="hidden" id="bookingOTP" name="OTP">
                            
                            <div class="relative">
                                <label class="text-xs font-black text-gray-500">PICKUP LOCATION</label>
                                <div class="flex mt-1">
                                    <input type="text" id="pickup" name="Pickup" required placeholder="Where from?" onkeyup="searchLocation(this.value, 'pickup')" class="w-full p-4 bg-slate-50 border-2 rounded-l-xl font-bold">
                                    <button type="button" onclick="useCurrentLocation('pickup')" class="bg-slate-800 text-white px-4 rounded-r-xl"><i class="fas fa-location-arrow"></i></button>
                                </div>
                                <div id="pickup-suggestions" class="suggestions-box"></div>
                            </div>

                            <div class="relative">
                                <label class="text-xs font-black text-gray-500">DROP LOCATION</label>
                                <div class="flex mt-1">
                                    <input type="text" id="drop" name="Drop" required placeholder="Where to?" onkeyup="searchLocation(this.value, 'drop')" class="w-full p-4 bg-slate-50 border-2 rounded-l-xl font-bold">
                                    <button type="button" onclick="useCurrentLocation('drop')" class="bg-slate-800 text-white px-4 rounded-r-xl"><i class="fas fa-map-marker-alt"></i></button>
                                </div>
                                <div id="drop-suggestions" class="suggestions-box"></div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="text-xs font-black text-gray-500">DATE</label><input type="date" id="date" name="Date" required class="w-full p-3 bg-slate-50 border-2 rounded-xl font-bold"></div>
                                <div><label class="text-xs font-black text-gray-500">TIME</label><input type="time" id="time" name="Time" required class="w-full p-3 bg-slate-50 border-2 rounded-xl font-bold"></div>
                            </div>

                            <div id="liveEstimateBox" class="hidden bg-blue-900 text-white p-4 rounded-2xl"></div>

                            <button type="submit" id="submitBtn" class="w-full bg-blue-700 text-white py-5 rounded-2xl font-black text-xl shadow-lg hover:bg-blue-800 transition">🚀 BOOK NOW</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <section id="tours" class="page-section max-w-7xl mx-auto px-5 py-12">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-black uppercase">🗺️ Cab Explorer</h1>
                <p class="text-gray-500 font-bold">Discover MP destinations with fixed-rate transparency</p>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-lg mb-8 flex flex-col md:flex-row gap-4 items-center justify-between border border-gray-100">
                <div class="relative w-full max-w-md">
                    <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
                    <input type="text" id="tourSearchInput" onkeyup="filterToursAndSearch()" placeholder="Search destinations..." class="explorer-search-input pl-12 bg-slate-50">
                </div>
                <div class="flex flex-wrap gap-2">
                    <button onclick="setSeasonFilter('All')" class="filter-chip season-filter active px-4 py-2 rounded-full text-xs font-black" data-season="All">All Seasons</button>
                    <button onclick="setSeasonFilter('Monsoon')" class="filter-chip season-filter px-4 py-2 rounded-full text-xs font-black" data-season="Monsoon">Monsoon</button>
                    <button onclick="setSeasonFilter('Winter')" class="filter-chip season-filter px-4 py-2 rounded-full text-xs font-black" data-season="Winter">Winter</button>
                </div>
            </div>

            <div id="dynamic-tours-container" class="tours-explorer-grid"></div>
        </section>

        <section id="faq" class="page-section max-w-4xl mx-auto px-5 py-12">
            <h2 class="text-3xl font-black mb-8 text-center uppercase">❓ Questions?</h2>
            <div id="faqContainer" class="space-y-4"></div>
        </section>
    </main>

    <div id="billModal" class="modal fixed inset-0">
        <div class="bg-white rounded-3xl max-w-lg w-full mx-4 overflow-hidden shadow-2xl">
            <div class="bg-slate-800 p-6 text-white text-center">
                <h2 class="text-2xl font-black">🧾 RIDE SUMMARY</h2>
            </div>
            <div class="p-6">
                <div id="billInputSection" class="space-y-3">
                    <input type="number" id="inputActualKM" placeholder="Total KM Traveled" class="w-full p-4 border-2 rounded-xl font-bold">
                    <input type="number" id="inputWaitTime" placeholder="Wait time (mins)" class="w-full p-4 border-2 rounded-xl font-bold">
                    <button onclick="calculateFinalBill()" class="w-full bg-blue-700 text-white p-4 rounded-xl font-black">GENERATE BILL</button>
                </div>
                <div id="billDisplaySection" class="hidden space-y-4">
                    <div id="billDetails" class="text-sm font-bold text-slate-700 divide-y"></div>
                    <button onclick="processPaymentAndReview()" class="w-full bg-green-600 text-white p-4 rounded-xl font-black">PAID & CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal fixed inset-0">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center">
            <h2 class="text-xl font-black mb-4">Quick Login</h2>
            <input type="text" id="nameInput" placeholder="Your Name" class="w-full p-3 border-2 rounded-xl mb-3 font-bold">
            <input type="tel" id="mobileInput" placeholder="Mobile Number" class="w-full p-3 border-2 rounded-xl mb-4 font-bold">
            <button onclick="sendOTP()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-black">GO</button>
        </div>
    </div>

    <footer class="bg-slate-900 text-gray-500 py-10 text-center text-xs">
        <p class="text-white font-black text-lg mb-2">EasyGo Cabs</p>
        <p>Omaxe City 1, Indore | +91 76518 37322</p>
    </footer>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx_hQ_PJd61KiIqgNlha_TN3Gm7wfmsHLJYnRqAPtzH72zLZaLKDGcnkv4sKhDTfAEF/exec';
        const PRIME_SQUARE = L.latLng(22.7628, 75.9234);
        let map, pickupMarker, dropMarker, allToursData = [], currentSeason = 'All';
        let selectedPackageBasePrice = 0;

        // Initialize App
        window.onload = () => {
            initMap();
            loadDynamicTours();
            buildFaq();
            checkActiveRide();
            if(localStorage.getItem('easygo_user')) loginUI(localStorage.getItem('easygo_user'), localStorage.getItem('easygo_name'));
            document.getElementById('date').valueAsDate = new Date();
        };

        function initMap() {
            map = L.map('map').setView([22.7196, 75.8577], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            const gIcon = L.icon({iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize:[25,41], iconAnchor:[12,41]});
            const rIcon = L.icon({iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize:[25,41], iconAnchor:[12,41]});
            
            pickupMarker = L.marker([22.7196, 75.8577], {icon: gIcon, draggable: true}).addTo(map);
            dropMarker = L.marker([22.75, 75.89], {icon: rIcon, draggable: true}).addTo(map);

            const updateMapLogic = async (marker, type) => {
                const ll = marker.getLatLng();
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${ll.lat}&lon=${ll.lng}`);
                const data = await res.json();
                document.getElementById(type).value = data.display_name.split(',')[0] + (data.address.suburb ? ', ' + data.address.suburb : '');
                calculateDist();
            };

            pickupMarker.on('dragend', () => updateMapLogic(pickupMarker, 'pickup'));
            dropMarker.on('dragend', () => updateMapLogic(dropMarker, 'drop'));
        }

        function calculateDist() {
            let d = (pickupMarker.getLatLng().distanceTo(dropMarker.getLatLng()) * 1.3 / 1000).toFixed(2);
            document.getElementById('mapDistanceDisplay').innerText = d + " km";
            updateEstimate(parseFloat(d));
        }

        function updateEstimate(dist) {
            let arrivalKm = Math.max(0, (PRIME_SQUARE.distanceTo(pickupMarker.getLatLng())/1000 - 3));
            let arrivalCharge = Math.round(arrivalKm * 10);
            let base = dist <= 5 ? 100 : (dist <= 10 ? 180 : 320);
            let extra = dist > 20 ? (dist - 20) * 16 : 0;
            let sub = base + extra + arrivalCharge + selectedPackageBasePrice;
            let total = Math.round(sub * 1.05);

            let box = document.getElementById('liveEstimateBox');
            box.innerHTML = `<div class="flex justify-between font-black"><span>ESTIMATED FARE</span><span>₹${total}</span></div>
                             <p class="text-[10px] opacity-70 mt-1">Includes ${dist}km ride + GST. Waiting extra.</p>`;
            box.classList.remove('hidden');
        }

        // EXPLORER LOGIC
        function setSeasonFilter(s) {
            currentSeason = s;
            document.querySelectorAll('.season-filter').forEach(b => b.classList.toggle('active', b.dataset.season === s));
            filterToursAndSearch();
        }

        function filterToursAndSearch() {
            const search = document.getElementById('tourSearchInput').value.toLowerCase();
            const filtered = allToursData.filter(t => {
                const sMatch = currentSeason === 'All' || t.Season.includes(currentSeason);
                const kMatch = t.Destination.toLowerCase().includes(search) || t.Description.toLowerCase().includes(search);
                return sMatch && kMatch;
            });
            renderTours(filtered);
        }

        function renderTours(tours) {
            const container = document.getElementById('dynamic-tours-container');
            container.innerHTML = tours.map(t => `
                <div class="tour-card">
                    <img src="${t.ImageURL}" class="h-48 w-full object-cover">
                    <div class="p-5">
                        <h3 class="text-xl font-black">${t.Destination}</h3>
                        <p class="text-xs text-gray-500 my-2 line-clamp-2">${t.Description}</p>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-2xl font-black text-blue-700">₹${t.Price}</span>
                            <button onclick="bookTourPackage('${t.Destination}', ${t.Price})" class="bg-slate-900 text-white px-4 py-2 rounded-lg font-bold text-xs">SELECT</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function bookTourPackage(dest, price) {
            selectedPackageBasePrice = price;
            document.getElementById('drop').value = dest;
            showPage('home');
            
            // Move marker to destination (Geocoding)
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${dest}+Indore`);
            const data = await res.json();
            if(data[0]) {
                const ll = [data[0].lat, data[0].lon];
                dropMarker.setLatLng(ll);
                map.flyTo(ll, 12);
                calculateDist();
            }
            showToast(`📍 Destination set to ${dest}`, "success");
        }

        // AUTH & BOOKING
        function sendOTP() {
            const n = document.getElementById('nameInput').value;
            const m = document.getElementById('mobileInput').value;
            if(!n || m.length < 10) return showToast("Invalid Details", "error");
            localStorage.setItem('easygo_user', m);
            localStorage.setItem('easygo_name', n);
            loginUI(m, n);
            closeLoginModal();
        }

        function handleBooking(e) {
            e.preventDefault();
            if(!localStorage.getItem('easygo_user')) return openLoginModal();
            
            const otp = Math.floor(100000 + Math.random() * 900000);
            const ride = {
                name: localStorage.getItem('easygo_name'),
                phone: localStorage.getItem('easygo_user'),
                pickup: document.getElementById('pickup').value,
                drop: document.getElementById('drop').value,
                otp: otp,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value
            };
            
            localStorage.setItem('active_ride', JSON.stringify(ride));
            checkActiveRide();
            
            const msg = `*NEW EASYGO BOOKING*%0A👤 Name: ${ride.name}%0A📍 Pickup: ${ride.pickup}%0A🏁 Drop: ${ride.drop}%0A⏰ Time: ${ride.time}%0A🔐 OTP: ${otp}`;
            window.open(`https://wa.me/917651837322?text=${msg}`, '_blank');
        }

        // BILLING
        function calculateFinalBill() {
            const km = parseFloat(document.getElementById('inputActualKM').value);
            const wait = parseFloat(document.getElementById('inputWaitTime').value) || 0;
            const base = km <= 5 ? 100 : (km <= 10 ? 180 : 320);
            const extra = km > 20 ? (km - 20) * 16 : 0;
            const sub = base + (wait * 2) + selectedPackageBasePrice;
            const gst = Math.round(sub * 0.05);

            document.getElementById('billDetails').innerHTML = `
                <div class="py-2 flex justify-between"><span>Base Slab (${km}km)</span><span>₹${base}</span></div>
                <div class="py-2 flex justify-between"><span>Wait Time (${wait}m)</span><span>₹${wait*2}</span></div>
                ${selectedPackageBasePrice > 0 ? `<div class="py-2 flex justify-between"><span>Package Charge</span><span>₹${selectedPackageBasePrice}</span></div>` : ''}
                <div class="py-2 flex justify-between text-green-600"><span>Extra KM Discount</span><span>-₹${extra}</span></div>
                <div class="py-2 flex justify-between"><span>GST (5%)</span><span>₹${gst}</span></div>
                <div class="py-4 flex justify-between text-xl font-black"><span>TOTAL</span><span>₹${sub + gst}</span></div>
            `;
            document.getElementById('billInputSection').classList.add('hidden');
            document.getElementById('billDisplaySection').classList.remove('hidden');
        }

        // Helpers
        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function openLoginModal() { document.getElementById('loginModal').classList.add('active'); }
        function closeLoginModal() { document.getElementById('loginModal').classList.remove('active'); }
        function loginUI(m, n) { 
            document.getElementById('loginBtn').classList.add('hidden'); 
            document.getElementById('userMenu').classList.remove('hidden');
            document.getElementById('displayUserName').innerText = n;
        }
        function checkActiveRide() {
            const active = localStorage.getItem('active_ride');
            if(active) {
                const r = JSON.parse(active);
                document.getElementById('activeRideBanner').classList.remove('hidden');
                document.getElementById('activeRideRoute').innerText = `${r.pickup} → ${r.drop}`;
                document.getElementById('activeRideOTP').innerText = r.otp;
            } else document.getElementById('activeRideBanner').classList.add('hidden');
        }
        function endRideProcess() { document.getElementById('billModal').classList.add('active'); }
        function processPaymentAndReview() {
            localStorage.removeItem('active_ride');
            location.reload();
        }
        function showToast(m, t) {
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-xl text-white font-bold ${t === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toast.innerText = m;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        async function loadDynamicTours() {
            const res = await fetch(scriptURL + "?action=getTours");
            const data = await res.json();
            allToursData = data.tours;
            renderTours(allToursData);
        }
        function buildFaq() {
            const faqs = [
                {q: "How is fare calculated?", a: "We use slab rates: 0-5km ₹100, 5-10km ₹180, 10-20km ₹320. Extra KM ₹16 + 5% GST."},
                {q: "Is there surge pricing?", a: "No. Our prices are fixed based on distance and slab rates regardless of time or demand."}
            ];
            document.getElementById('faqContainer').innerHTML = faqs.map(f => `
                <div class="faq-item bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <button class="w-full text-left font-black flex justify-between" onclick="this.parentElement.classList.toggle('active')">
                        <span>${f.q}</span><i class="fas fa-chevron-down faq-icon"></i>
                    </button>
                    <div class="faq-answer mt-2 text-gray-500 text-sm">${f.a}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
